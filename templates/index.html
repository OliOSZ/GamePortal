<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/style.css') }}">
    <title>Game Hub</title>
</head>
<body>
    <nav class="navbar">
        <div class="logoContainer">
            <a href="/">
                <img class="logo" src="../static/images/GameHubTextLogo.png" alt="Game Hub">
            </a>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search games..." id="searchInput">
        </div>
        <div class="profile">
            <button class="profile-button"><i class='bx bx-user-circle' id="bx-user-circle"></i></button>
        </div>
    </nav>

    <main>
        <div class="game-grid" id="gameGrid">
            <div class="game-card" data-title='["TicTacToe", "Tic-Tac-Toe", "Tic Tac Toe"]'>
                <img src="../static/images/Tictactoe.jpg">
                <h3>Tic Tac Toe</h3>
                <a href="/TTT">Spill</a>
            </div>
            <div class="game-card" data-title="Game 2">
                <img src="https://via.placeholder.com/250x160" alt="Game 2">
                <h3>Game 2</h3>
                <a href="#">Spill</a>
            </div>
            <div class="game-card" data-title="Game 3">
                <img src="https://via.placeholder.com/250x160" alt="Game 3">
                <h3>Game 3</h3>
                <a href="#">Spill</a>
            </div>
            <div class="game-card" data-title="Game 4">
                <img src="https://via.placeholder.com/250x160" alt="Game 4">
                <h3>Game 4</h3>
                <a href="#">Spill</a>
            </div>
        </div>
    </main>
    <script src="{{ url_for('static',filename='scripts/script.js') }}"></script>
</body>
</html>
