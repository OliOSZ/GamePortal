<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" href="style.css">
    <title>Game Hub</title>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Game Hub</div>
        <div class="search-bar">
            <input type="text" placeholder="Search games...">
        </div>
        <div class="profile">
            <button>Login</button>
            <button>Sign Up</button>
        </div>
    </nav>

    <main>
        <div class="game-grid">
            <div class="game-card">
                <img src="/images/tic-tac-toe.jpg">
                <h3>Game 1</h3>
                <a href="/TTT">Spill</a>
            </div>
            <div class="game-card">
                <img src="https://via.placeholder.com/250x160" alt="Game 2">
                <h3>Game 2</h3>
                <a href="#">Spill</a>
            </div>
            <div class="game-card">
                <img src="https://via.placeholder.com/250x160" alt="Game 3">
                <h3>Game 3</h3>
                <a href="#">Spill</a>
            </div>
            <div class="game-card">
                <img src="https://via.placeholder.com/250x160" alt="Game 4">
                <h3>Game 4</h3>
                <a href="#">Spill</a>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
